<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Electro LED</title>

    <meta property="og:title" content="Catálogo Electro LED - San Juan">
    <meta property="og:description" content="Especialistas en Domótica, Iluminación y Seguridad. Mirá nuestro catálogo online y hacé tu pedido.">
    <meta property="og:image" content="https://i.postimg.cc/tgsKp9dP/e6aeb6dd-6335-4fce-b702-2ec8b3ed3e0e.png">
    <meta property="og:url" content="https://electroled.github.io/Catalogo/">
    <meta property="og:type" content="website">

    <link rel="icon" href="https://i.postimg.cc/tgsKp9dP/e6aeb6dd-6335-4fce-b702-2ec8b3ed3e0e.png" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-5 text-white">

<header class="relative text-center mb-10 max-w-4xl mx-auto pt-6 px-4">
        
        <a href="https://www.instagram.com/electroledsanjuan/" target="_blank" 
           class="absolute -left-2 md:left-2 top-8 md:top-20 flex flex-col items-center hover:scale-105 transition-transform duration-300 w-24 z-20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" 
                 alt="Instagram Electro LED" 
                 class="w-10 h-10 md:w-12 md:h-12 drop-shadow-lg mb-1">
            <span class="text-[10px] text-center font-bold text-pink-400 bg-slate-900/80 px-1 py-0.5 rounded leading-tight border border-pink-500/30">
                ¡5% de descuento<br>si nos seguís!
            </span>
        </a>

        <img src="https://i.postimg.cc/tgsKp9dP/e6aeb6dd-6335-4fce-b702-2ec8b3ed3e0e.png" 
             alt="Logo Electro LED" 
             style="height: 180px;" 
             class="mb-4 object-contain mx-auto relative z-10">
        <p class="text-gray-300 font-semibold text-lg">Domótica e Iluminación - San Juan</p>

        <a href="https://wa.me/5492645725220" target="_blank" 
           class="absolute -right-2 md:right-2 top-8 md:top-20 flex flex-col items-center hover:scale-105 transition-transform duration-300 w-24 z-20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" 
                 alt="WhatsApp Electro LED" 
                 class="w-10 h-10 md:w-12 md:h-12 drop-shadow-lg mb-1">
            <span class="text-[10px] text-center font-bold text-green-400 bg-slate-900/80 px-1 py-0.5 rounded leading-tight border border-green-500/30">
                ¡Consultanos<br>tus dudas!
            </span>
        </a>
        
    </header>

    <div class="max-w-6xl mx-auto mb-6 px-2">
        <input type="text" id="buscador" placeholder="Buscar... 🔍" 
               class="w-full py-2.5 px-4 rounded-lg shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-black font-medium text-base">
    </div>

    <div class="flex flex-wrap justify-center gap-3 mb-8 max-w-6xl mx-auto">
        <button onclick="filtrarCategoria('Todas')" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors shadow-sm">Ver Todo</button>
        <button onclick="filtrarCategoria('Iluminación')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Iluminación</button>
        <button onclick="filtrarCategoria('Cintas y Neón')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Cintas y Neón</button>
        <button onclick="filtrarCategoria('Domótica')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Domótica</button>
        <button onclick="filtrarCategoria('Seguridad')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Seguridad</button>
        <button onclick="filtrarCategoria('Cartelería')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Cartelería</button>
        <button onclick="filtrarCategoria('Electrónica')" class="bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-slate-600 shadow-sm">Electrónica</button>
        <button onclick="filtrarCategoria('Kits')" class="bg-orange-600 hover:bg-orange-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-orange-400 shadow-sm">Kits</button>
        <button onclick="filtrarCategoria('Instalaciones')" class="bg-green-700 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-green-500 shadow-sm">Instalaciones</button>
    </div>

    <div id="catalogo" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto pb-20">
        </div>

    <a id="btn-carrito" href="#" target="_blank" class="hidden fixed bottom-4 right-4 bg-green-500 text-white px-3 py-2 rounded-xl shadow-2xl hover:bg-green-600 transition transform hover:scale-105 z-50 flex items-center gap-2 border border-green-400">
    </a>

    <script src="productos.js"></script>

    <script>
        const contenedor = document.getElementById('catalogo');
        const inputBuscador = document.getElementById('buscador');
        let carrito = []; 

        function quitarAcentos(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function filtrarCategoria(cat) {
            inputBuscador.value = ""; 
            if (cat === 'Todas') {
                mostrarProductos(productos);
            } else {
                const filtrados = productos.filter(p => p.categoria === cat);
                mostrarProductos(filtrados);
            }
        }

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            actualizarBotonCarrito();      
        }

        function actualizarBotonCarrito() {
            const btn = document.getElementById('btn-carrito');
            if (carrito.length > 0) {
                let total = 0;
                let textoMensaje = "Hola Pablo! Quiero hacer este pedido de Electro LED:%0A%0A";
                
                carrito.forEach(item => {
                    total += item.precio;
                    textoMensaje += `- ${item.nombre} ($${item.precio})%0A`;
                });
                
                textoMensaje += `%0A*Total estimado: $${total}*%0A%0A¿Tenés stock para coordinar?`;
                
                // Botón en dos renglones
                btn.innerHTML = `
                    <span class="text-2xl drop-shadow-md">🛒</span>
                    <div class="flex flex-col text-left">
                        <span class="font-extrabold text-sm leading-tight border-b border-green-400 pb-0.5 mb-0.5">Enviar Pedido</span>
                        <span class="text-[11px] font-semibold">${carrito.length} prod. - $${total}</span>
                    </div>
                `;
                
                btn.href = `https://wa.me/5492645725220?text=${textoMensaje}`;
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        function mostrarProductos(lista) {
            contenedor.innerHTML = ''; 
            if(lista.length === 0) {
                contenedor.innerHTML = '<p class="text-center col-span-3 text-gray-400 mt-10">No se encontraron productos en esta sección.</p>';
                return;
            }

            lista.forEach(p => {
                let etiquetaStock = '';
                let botonAñadir = `<button onclick="agregarAlCarrito('${p.nombre}', ${p.precio})" 
                               class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-blue-500 transition shadow-lg">
                               + Sumar
                            </button>`;

                // Evaluamos qué palabra clave le pusiste al producto
                if (p.aviso === "agotado") {
                    etiquetaStock = '<span class="absolute top-2 right-2 bg-purple-600 text-white px-2 py-1 rounded text-xs font-bold shadow-md z-10 border border-purple-400">A pedido</span>';
                    botonAñadir = `<button onclick="agregarAlCarrito('${p.nombre}', ${p.precio})" 
                               class="bg-purple-700 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-purple-600 transition shadow-lg">
                               Encargar
                            </button>`;
                } else if (p.aviso === "ultima") {
                    etiquetaStock = '<span class="absolute top-2 right-2 bg-red-600 text-white px-2 py-1 rounded text-xs font-bold shadow-md z-10 animate-pulse border border-red-400">¡Última unidad!</span>';
                } else if (p.aviso === "poco") {
                    etiquetaStock = '<span class="absolute top-2 right-2 bg-orange-500 text-white px-2 py-1 rounded text-xs font-bold shadow-md z-10 border border-orange-400">Poco stock</span>';
                } else if (p.aviso === "nuevo") {
                    etiquetaStock = '<span class="absolute top-2 right-2 bg-green-500 text-white px-2 py-1 rounded text-xs font-bold shadow-md z-10 border border-green-400 animate-bounce">¡Nuevo Ingreso!</span>';
                }

                contenedor.innerHTML += `
                    <div class="bg-gray-800 rounded-lg shadow-md overflow-hidden p-4 border-b-4 border-blue-500 flex flex-col justify-between transition-all hover:border-blue-400">
                        <div>
                            <div class="relative">
                                ${etiquetaStock}
                                <img src="${p.imagen}" class="w-full h-64 object-contain bg-white rounded-lg p-2 transition-transform duration-300 hover:scale-110" alt="${p.nombre}">
                            </div>
                            <div class="mt-4">
                                <span class="text-xs font-bold text-blue-500 uppercase">${p.categoria}</span>
                                <h2 class="text-xl font-bold text-white">${p.nombre}</h2>
                                <p class="text-gray-300 text-sm mt-1">${p.descripcion || ''}</p>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-2xl font-bold text-green-400">$${p.precio}</span>
                            ${botonAñadir}
                        </div>
                    </div>`;
            });
        }

        mostrarProductos(productos);

        // Buscador mejorado
        inputBuscador.addEventListener('keyup', (e) => {
            const textoBusqueda = quitarAcentos(e.target.value.toLowerCase());
            
            const filtrados = productos.filter(p => {
                const nombreLimpio = quitarAcentos(p.nombre.toLowerCase());
                const catLimpia = quitarAcentos(p.categoria.toLowerCase());
                const descLimpia = quitarAcentos((p.descripcion || '').toLowerCase()); 
                
                return nombreLimpio.includes(textoBusqueda) || 
                       catLimpia.includes(textoBusqueda) || 
                       descLimpia.includes(textoBusqueda);
            });
            
            mostrarProductos(filtrados);
        });
    </script>
</body>
</html>
